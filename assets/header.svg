<svg viewBox="0 0 1200 320" width="1200" height="320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hekimcan Aktaş — AI/ML Engineer · Full Stack Developer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16130e"/>
      <stop offset="0.55" stop-color="#1b1712"/>
      <stop offset="1" stop-color="#120f0b"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d97757"/>
      <stop offset="1" stop-color="#d97757" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d97757" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#d97757" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#d97757" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="card"><rect width="1200" height="320" rx="22"/></clipPath>
  </defs>

  <style>
    .rise{opacity:0;transform:translateY(16px);animation:rise 1s cubic-bezier(.2,.7,.2,1) forwards}
    .fade{opacity:0;animation:fade .9s ease forwards}
    .d1{animation-delay:.15s}.d2{animation-delay:.34s}.d3{animation-delay:.54s}.d4{animation-delay:.74s}
    .underline{transform:scaleX(0);transform-origin:left center;animation:draw 1.1s cubic-bezier(.2,.7,.2,1) .75s forwards}
    .dot{transform-box:fill-box;transform-origin:center;animation:pulse 2.8s ease-in-out infinite}
    .sweep{transform:translateX(-1300px);animation:sweep 7s ease-in-out 1.2s infinite}
    @keyframes rise{to{opacity:1;transform:translateY(0)}}
    @keyframes fade{to{opacity:1}}
    @keyframes draw{to{transform:scaleX(1)}}
    @keyframes pulse{0%,100%{opacity:.35;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
    @keyframes sweep{0%{transform:translateX(-1300px)}40%,100%{transform:translateX(1300px)}}
    text{font-family:'Segoe UI',-apple-system,Helvetica,Arial,sans-serif}
    .mono{font-family:'JetBrains Mono','SFMono-Regular',Consolas,monospace}
  </style>

  <g clip-path="url(#card)">
    <rect width="1200" height="320" fill="url(#bg)"/>
    <g stroke="#d97757" stroke-opacity="0.05">
      <line x1="300" y1="0" x2="300" y2="320"/>
      <line x1="600" y1="0" x2="600" y2="320"/>
      <line x1="900" y1="0" x2="900" y2="320"/>
    </g>

    <rect class="sweep" x="0" y="0" width="1300" height="320" fill="url(#scan)"/>

    <g class="rise d1">
      <rect class="dot" x="70" y="92" width="10" height="10" rx="2" fill="#d97757"/>
      <text class="mono" x="96" y="101" fill="#d99f86" font-size="15" letter-spacing="4">AI / ML ENGINEER &#183; FULL STACK DEVELOPER</text>
    </g>

    <text class="rise d2" x="68" y="190" fill="#f3ede2" font-size="74" font-weight="700" letter-spacing="-1">Hekimcan Aktaş</text>
    <rect class="underline" x="70" y="208" width="360" height="3" rx="2" fill="url(#rule)"/>
    <text class="rise d3" x="70" y="251" fill="#a89f92" font-size="21">Building intelligent systems that ship — from the model to the interface.</text>

    <text class="mono fade d4" x="1130" y="50" text-anchor="end" fill="#6b6359" font-size="13" letter-spacing="2">PROBEL YAZILIM</text>
    <text class="mono fade d4" x="1130" y="292" text-anchor="end" fill="#6b6359" font-size="13" letter-spacing="2">TR &#183; github.com/hekimm</text>
  </g>

  <rect x="0.5" y="0.5" width="1199" height="319" rx="22" fill="none" stroke="#d97757" stroke-opacity="0.18"/>
</svg>
