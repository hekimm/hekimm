<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1000 320" width="1000" height="320" role="img" aria-label="Hekimcan Aktas - AI/ML Engineer and Full Stack Developer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05070d">
        <animate attributeName="stop-color" values="#05070d;#0a0f1f;#071018;#05070d" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.5" stop-color="#0d1117">
        <animate attributeName="stop-color" values="#0d1117;#0b2230;#10182b;#0d1117" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#05070d">
        <animate attributeName="stop-color" values="#05070d;#071a22;#0a0f1f;#05070d" dur="12s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#6AD3F7" stop-opacity="0.55"/>
      <stop offset="0.45" stop-color="#1f6f8b" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#6AD3F7" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7ce7ff"/>
      <stop offset="0.5" stop-color="#6AD3F7"/>
      <stop offset="1" stop-color="#3a9fd6"/>
    </linearGradient>

    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="titleClip">
      <text x="500" y="170" text-anchor="middle"
            font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
            font-size="74" font-weight="800" letter-spacing="2">Hekimcan Akta&#351;</text>
    </clipPath>

    <style>
      .float    { animation: float 7s ease-in-out infinite; }
      .float2   { animation: float 9s ease-in-out infinite; }
      .float3   { animation: float 11s ease-in-out infinite; }
      .twinkle  { animation: twinkle 3.5s ease-in-out infinite; }
      .pulse    { animation: pulse 2.6s ease-in-out infinite; }
      .gridmove { animation: gridmove 18s linear infinite; }
      @keyframes float   { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }
      @keyframes twinkle { 0%,100% { opacity: .15; } 50% { opacity: .9; } }
      @keyframes pulse   { 0%,100% { opacity: .25; } 50% { opacity: 1; } }
      @keyframes gridmove{ from { transform: translateX(0); } to { transform: translateX(-60px); } }
    </style>
  </defs>

  <rect width="1000" height="320" fill="url(#bg)"/>

  <g class="gridmove" opacity="0.18" stroke="#6AD3F7" stroke-width="1">
    <line x1="0" y1="260" x2="1000" y2="260"/>
    <line x1="0" y1="285" x2="1000" y2="285"/>
    <line x1="0" y1="310" x2="1000" y2="310"/>
    <line x1="60"  y1="245" x2="60"  y2="320"/>
    <line x1="180" y1="245" x2="180" y2="320"/>
    <line x1="300" y1="245" x2="300" y2="320"/>
    <line x1="420" y1="245" x2="420" y2="320"/>
    <line x1="540" y1="245" x2="540" y2="320"/>
    <line x1="660" y1="245" x2="660" y2="320"/>
    <line x1="780" y1="245" x2="780" y2="320"/>
    <line x1="900" y1="245" x2="900" y2="320"/>
    <line x1="1020" y1="245" x2="1020" y2="320"/>
  </g>

  <ellipse cx="500" cy="150" rx="360" ry="120" fill="url(#glow)">
    <animate attributeName="cx" values="380;620;380" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="320;400;320" dur="6s" repeatCount="indefinite"/>
  </ellipse>

  <g stroke="#6AD3F7" stroke-width="1.2" fill="none">
    <path class="pulse" d="M90,90 L210,60 L340,110 L470,70"/>
    <path class="pulse" d="M90,90 L210,150 L340,110" style="animation-delay:.6s"/>
    <path class="pulse" d="M910,230 L790,200 L660,250 L530,210" style="animation-delay:.3s"/>
    <path class="pulse" d="M910,230 L790,170 L660,250" style="animation-delay:.9s"/>
  </g>
  <g fill="#7ce7ff">
    <circle class="twinkle" cx="90"  cy="90"  r="4"/>
    <circle class="twinkle" cx="210" cy="60"  r="3" style="animation-delay:.4s"/>
    <circle class="twinkle" cx="210" cy="150" r="3" style="animation-delay:.8s"/>
    <circle class="twinkle" cx="340" cy="110" r="4" style="animation-delay:1.2s"/>
    <circle class="twinkle" cx="470" cy="70"  r="3" style="animation-delay:.2s"/>
    <circle class="twinkle" cx="910" cy="230" r="4" style="animation-delay:.6s"/>
    <circle class="twinkle" cx="790" cy="200" r="3" style="animation-delay:1.0s"/>
    <circle class="twinkle" cx="790" cy="170" r="3" style="animation-delay:1.4s"/>
    <circle class="twinkle" cx="660" cy="250" r="4" style="animation-delay:.5s"/>
    <circle class="twinkle" cx="530" cy="210" r="3" style="animation-delay:1.1s"/>
  </g>

  <g fill="#6AD3F7">
    <circle class="float"  cx="140" cy="200" r="2.5" opacity="0.7"/>
    <circle class="float2" cx="300" cy="230" r="2"   opacity="0.5"/>
    <circle class="float3" cx="700" cy="100" r="2.5" opacity="0.6"/>
    <circle class="float"  cx="840" cy="120" r="2"   opacity="0.5"/>
    <circle class="float2" cx="620" cy="60"  r="2.5" opacity="0.6"/>
    <circle class="float3" cx="460" cy="250" r="2"   opacity="0.5"/>
  </g>

  <text x="500" y="170" text-anchor="middle" filter="url(#soft)"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="74" font-weight="800" letter-spacing="2" fill="url(#title)">Hekimcan Akta&#351;</text>

  <g clip-path="url(#titleClip)">
    <rect x="-300" y="90" width="220" height="110" fill="url(#sweep)" opacity="0.85" transform="skewX(-18)">
      <animate attributeName="x" values="-300;1100" dur="4.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g font-family="'Fira Code','Consolas',monospace" font-size="22" font-weight="600">
    <text x="500" y="222" text-anchor="middle" fill="#cfeefc">AI/ML Engineer <tspan fill="#6AD3F7">&#8212;</tspan> Full Stack Developer<animate attributeName="opacity" values="0;1;1;0.85;1" dur="6s" repeatCount="indefinite"/></text>
    <rect x="772" y="206" width="11" height="22" fill="#6AD3F7">
      <animate attributeName="opacity" values="0;0;1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <rect x="-400" y="0" width="260" height="320" fill="url(#sweep)" opacity="0.07" transform="skewX(-22)">
    <animate attributeName="x" values="-400;1300" dur="7s" repeatCount="indefinite"/>
  </rect>

  <rect x="0" y="0"   width="1000" height="6" fill="#6AD3F7" opacity="0.5"/>
  <rect x="0" y="314" width="1000" height="6" fill="#6AD3F7" opacity="0.5"/>
</svg>
